<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESL Shopping Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Comic Neue', cursive;
            background-color: #f0f9ff;
            overflow-x: hidden;
        }
        .title-font {
            font-family: 'Fredoka One', cursive;
        }
        .card-container {
            perspective: 1000px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card-inner.is-flipped {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .card-front {
            background-color: white;
            border: 4px solid #3b82f6;
        }
        .card-back {
            background-color: #fef3c7;
            border: 4px solid #f59e0b;
            transform: rotateY(180deg);
        }
        .oops-bg {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
        }
        .speech-bubble {
            position: relative;
            background: #ffffff;
            border-radius: .4em;
            padding: 10px;
        }
        .speech-bubble:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 0;
            border: 20px solid transparent;
            border-top-color: #ffffff;
            border-bottom: 0;
            border-left: 0;
            margin-left: -10px;
            margin-bottom: -20px;
        }
        .bounce {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
        .item-image {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Header Section -->
    <div class="max-w-5xl mx-auto text-center mb-8">
        <h1 class="title-font text-4xl md:text-6xl text-blue-600 mb-4 tracking-wide">
            What would you like to buy? 💰
        </h1>
        
        <div class="bg-yellow-100 border-4 border-dashed border-yellow-400 rounded-2xl p-6 mb-8 inline-block shadow-sm">
            <p class="text-2xl md:text-3xl text-gray-700">
                <span class="text-red-500 font-bold">Pattern:</span> 
                I’d like to buy a/some <span class="bg-white px-4 py-1 rounded border-2 border-gray-300">________</span>.
            </p>
        </div>
    </div>

    <!-- Game Grid -->
    <div id="game-grid" class="max-w-5xl mx-auto grid grid-cols-2 md:grid-cols-5 gap-4">
        <!-- Cards will be generated here -->
    </div>

    <!-- Speech Reminder -->
    <div class="fixed bottom-4 right-4 flex items-center gap-3">
        <div class="speech-bubble shadow-lg border-2 border-blue-400 text-lg font-bold text-blue-600">
            Don't forget to speak! 🗣️
        </div>
        <div class="text-5xl bounce">🛍️</div>
    </div>

    <script>
        const items = [
            { id: 'cap', name: 'cap', file: 'cap.png', grammar: 'a' },
            { id: 'blouse', name: 'blouse', file: 'blouse.png', grammar: 'a' },
            { id: 'poloshirt', name: 'polo shirt', file: 'poloshirt.png', grammar: 'a' },
            { id: 'belt', name: 'belt', file: 'belt.png', grammar: 'a' },
            { id: 'scarf', name: 'scarf', file: 'scarf.png', grammar: 'a' },
            { id: 'gloves', name: 'gloves', file: 'gloves.png', grammar: 'some' },
            { id: 'trousers', name: 'trousers', file: 'trousers.png', grammar: 'some' },
            { id: 'sunglasses', name: 'sunglasses', file: 'sunglasses.png', grammar: 'some' },
            { id: 'boots', name: 'boots', file: 'boots.png', grammar: 'some' },
            { id: 'socks', name: 'socks', file: 'socks.png', grammar: 'some' }
        ];

        function initGame() {
            const grid = document.getElementById('game-grid');
            
            // Define exactly what the 10 cards will hide:
            // Three "oops", One 300, Two 200s, and Four 100s
            let outcomes = ['oops', 'oops', 'oops', 300, 200, 200, 100, 100, 100, 100];
            
            // Shuffle the outcomes array randomly
            for (let i = outcomes.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [outcomes[i], outcomes[j]] = [outcomes[j], outcomes[i]];
            }

            items.forEach((item, index) => {
                const outcome = outcomes[index];
                const isOops = outcome === 'oops';
                const price = isOops ? null : outcome;
                
                const card = document.createElement('div');
                card.className = 'card-container h-48 md:h-56';
                
                card.innerHTML = `
                    <div class="card-inner" onclick="flipCard(this)">
                        <div class="card-front p-4">
                            <img src="${item.file}" alt="${item.name}" class="item-image mb-2" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                            <span class="text-4xl hidden mb-2">📦</span> <!-- Fallback icon if image fails -->
                            <span class="text-xl md:text-2xl font-bold text-gray-800 capitalize">${item.name}</span>
                        </div>
                        <div class="card-back ${isOops ? 'oops-bg' : ''} p-4">
                            ${isOops ? `
                                <span class="text-5xl mb-2">😵</span>
                                <span class="text-2xl font-bold text-red-600">Oops, sorry!</span>
                            ` : `
                                <span class="text-5xl mb-2">💰</span>
                                <span class="text-4xl font-bold text-green-600">$${price}</span>
                            `}
                            <div class="mt-4 bg-white/50 px-2 py-1 rounded text-sm text-gray-600 border border-black/10">
                                "I'd like to buy ${item.grammar} ${item.name}."
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function flipCard(element) {
            element.classList.toggle('is-flipped');
        }

        window.onload = initGame;
    </script>
</body>
</html>
